<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mike HTML Demos</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f1e7;
      color: #25211c;
      font-family: "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    }
    main {
      width: min(720px, calc(100% - 32px));
      padding: 36px;
      background: #fffdf8;
      border: 1px solid #dfd0bd;
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(58, 41, 23, .12);
    }
    h1 { margin: 0 0 18px; font-size: clamp(32px, 8vw, 56px); }
    a {
      display: block;
      padding: 16px 0;
      color: #9f352a;
      font-size: 20px;
      font-weight: 700;
      text-decoration-thickness: 1px;
      text-underline-offset: 5px;
    }
    p { margin: 0; color: #6c6258; }
  </style>
</head>
<body>
  <main>
    <h1>HTML Demos</h1>
    <a href="./2026-beijing-family-trip/">2026 北京親子行程</a>
    <p>Temporary static pages grouped by project folder.</p>
  </main>
</body>
</html>
