<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">北京西北園林、長城與東側轉場示意圖</title>
  <desc id="desc">示意頤和園、市中心、慕田峪長城、通州環球影城的相對方位與住宿轉場。</desc>
  <defs>
    <style>
      .bg{fill:#fbf6ec}.panel{fill:#fffdf8;stroke:#dfd0bd;stroke-width:2}.line{fill:none;stroke:#cbb79d;stroke-width:6;stroke-linecap:round;stroke-dasharray:12 16}.west{fill:none;stroke:#3d5f85;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.east{fill:none;stroke:#2f6b56;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.label{font-family:"PingFang TC","Noto Sans TC",sans-serif;fill:#26231f}.muted{fill:#6f675f}.title{font-size:46px;font-weight:800}.small{font-size:22px}.tiny{font-size:18px}.node{stroke:#fffdf8;stroke-width:5}.stay{fill:#2f6b56}.park{fill:#3d5f85}.spa{fill:#7b5aa6}.universal{fill:#1f5e78}.shop{fill:#b47a2c}.day{font-size:18px;font-weight:800;fill:#fffdf8}.zone{fill:#f4f8ee;stroke:#cbd8ba;stroke-width:2}.eastzone{fill:#eaf4f2;stroke:#b8d2cb;stroke-width:2}.shadow{filter:url(#shadow)}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#5c3d20" flood-opacity=".15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3d5f85"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f6b56"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="820"/>
  <rect x="44" y="44" width="1112" height="732" rx="18" class="panel shadow"/>
  <text x="86" y="110" class="label title">西北園林／長城 → 市中心 → 東側環球</text>
  <text x="88" y="148" class="label small muted">用來判斷 7/12-7/15 的住宿與轉場是否順</text>

  <rect x="92" y="220" width="330" height="350" rx="18" class="zone"/>
  <text x="122" y="260" class="label small" font-weight="800">西北／北側：園林與長城</text>
  <text x="122" y="292" class="label tiny muted">頤和園、慕田峪長城</text>

  <rect x="468" y="286" width="250" height="210" rx="18" fill="#fff7ea" stroke="#dfd0bd" stroke-width="2"/>
  <text x="498" y="326" class="label small" font-weight="800">市中心基地</text>
  <text x="498" y="358" class="label tiny muted">王府井／東單／崇文門／前門</text>

  <rect x="770" y="240" width="330" height="350" rx="18" class="eastzone"/>
  <text x="800" y="280" class="label small" font-weight="800">東側：環球與後段住宿</text>
  <text x="800" y="312" class="label tiny muted">通州環球度假區周邊</text>

  <path d="M250 360 C330 340 430 352 540 386" class="west" marker-end="url(#arrowBlue)"/>
  <path d="M275 438 C370 430 468 420 540 386" class="west" marker-end="url(#arrowBlue)"/>
  <path d="M610 386 C720 390 820 410 900 452" class="east" marker-end="url(#arrowGreen)"/>
  <path d="M900 452 C944 470 988 504 1010 548" class="east" marker-end="url(#arrowGreen)"/>
  <path d="M540 386 C650 306 760 270 900 320" class="line"/>

  <circle cx="250" cy="360" r="20" class="park node"/><text x="245" y="367" text-anchor="middle" class="day">12</text>
  <text x="122" y="366" class="label tiny">頤和園</text>
  <circle cx="275" cy="438" r="20" class="park node"/><text x="270" y="445" text-anchor="middle" class="day">13</text>
  <text x="122" y="444" class="label tiny">慕田峪長城</text>
  <circle cx="342" cy="498" r="16" class="shop node"/>
  <text x="120" y="504" class="label tiny">海淀／嘻番里備選</text>

  <circle cx="540" cy="386" r="22" class="stay node"/>
  <text x="568" y="392" class="label tiny">前段住宿基地</text>

  <circle cx="900" cy="452" r="20" class="spa node"/><text x="895" y="459" text-anchor="middle" class="day">14</text>
  <text x="924" y="446" class="label tiny">胡同後往東轉場</text>
  <text x="924" y="474" class="label tiny muted">市中心 → 通州</text>
  <circle cx="1010" cy="548" r="22" class="universal node"/><text x="1005" y="555" text-anchor="middle" class="day">15</text>
  <text x="820" y="556" class="label tiny">北京環球影城</text>
  <circle cx="980" cy="612" r="19" class="stay node"/>
  <text x="805" y="618" class="label tiny">後段住宿：通州環球附近</text>

  <rect x="118" y="628" width="930" height="72" rx="12" fill="#fff7ea" stroke="#dfd0bd"/>
  <text x="148" y="660" class="label tiny" font-weight="800">判斷</text>
  <text x="148" y="690" class="label tiny muted">7/13 長城獨立一天較合理；7/14 放輕做胡同與轉場，晚上住通州準備環球。</text>
</svg>
