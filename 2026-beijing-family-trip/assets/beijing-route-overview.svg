<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">2026 北京親子行程全程方位總覽</title>
  <desc id="desc">示意北京主要景點方位：市中心住宿基地、西北園林、東側湯泉與環球影城。</desc>
  <defs>
    <style>
      .bg{fill:#fbf6ec}.ring{fill:none;stroke:#e3d4c0;stroke-width:2}.road{fill:none;stroke:#cbb79d;stroke-width:6;stroke-linecap:round;stroke-dasharray:14 16}.route{fill:none;stroke:#b63d2f;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.route2{fill:none;stroke:#2f6b56;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.route3{fill:none;stroke:#3d5f85;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.area{fill:#fffdf8;stroke:#dfd0bd;stroke-width:2}.label{font-family:"PingFang TC","Noto Sans TC",sans-serif;fill:#26231f}.muted{fill:#6f675f}.small{font-size:22px}.tiny{font-size:18px}.title{font-size:46px;font-weight:800}.node{stroke:#fffdf8;stroke-width:5}.stay{fill:#2f6b56}.classic{fill:#b63d2f}.park{fill:#3d5f85}.shop{fill:#b47a2c}.spa{fill:#7b5aa6}.universal{fill:#1f5e78}.day{font-size:18px;font-weight:800;fill:#fffdf8}.arrow{fill:#b63d2f}.shadow{filter:url(#shadow)}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#5c3d20" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b63d2f"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f6b56"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="820"/>
  <rect x="44" y="44" width="1112" height="732" rx="18" class="area shadow"/>
  <text x="86" y="110" class="label title">北京親子行程路線總覽</text>
  <text x="88" y="148" class="label small muted">示意圖：看方位與移動是否順，不作導航用</text>

  <g transform="translate(1030 82)">
    <path d="M0,-34 L10,-8 L36,0 L10,8 L0,34 L-10,8 L-36,0 L-10,-8 Z" fill="#fff4dc" stroke="#b47a2c" stroke-width="2"/>
    <text x="-7" y="-46" class="label tiny" font-weight="800">北</text>
    <text x="-7" y="66" class="label tiny">南</text>
    <text x="-70" y="6" class="label tiny">西</text>
    <text x="52" y="6" class="label tiny">東</text>
  </g>

  <ellipse cx="572" cy="418" rx="390" ry="245" class="ring"/>
  <ellipse cx="572" cy="418" rx="250" ry="150" class="ring"/>
  <path d="M140 470 C300 420 438 410 600 420 C780 432 920 452 1070 520" class="road"/>
  <path d="M550 180 C570 305 585 450 575 650" class="road"/>

  <rect x="360" y="306" width="260" height="155" rx="14" fill="#fff7ea" stroke="#d2baa0" stroke-width="2"/>
  <text x="386" y="340" class="label small" font-weight="800">市中心住宿基地</text>
  <text x="386" y="372" class="label tiny muted">王府井／東單／崇文門／前門</text>
  <text x="386" y="402" class="label tiny muted">7/9-7/14 前段住宿</text>

  <path d="M490 382 L500 360 L515 382 Z" class="stay node"/>
  <circle cx="510" cy="378" r="14" class="stay node"/>
  <text x="528" y="384" class="label tiny">住市中心</text>

  <path d="M500 380 L480 385 L462 405 L445 430 L455 485 L420 526 L360 420 L250 320" class="route" marker-end="url(#arrow)"/>
  <path d="M500 380 L520 428 L520 535 L610 390" class="route2" marker-end="url(#arrowGreen)"/>
  <path d="M500 380 L690 420 L815 462 L970 520" class="route3" marker-end="url(#arrowGreen)"/>

  <g>
    <circle cx="505" cy="360" r="18" class="shop node"/><text x="500" y="367" text-anchor="middle" class="day">9</text>
    <text x="530" y="352" class="label tiny">王府井＋谷子店</text>
    <circle cx="462" cy="405" r="18" class="classic node"/><text x="457" y="412" text-anchor="middle" class="day">10</text>
    <text x="256" y="402" class="label tiny">天安門／故宮</text>
    <circle cx="520" cy="535" r="18" class="classic node"/><text x="515" y="542" text-anchor="middle" class="day">11</text>
    <text x="545" y="542" class="label tiny">天壇</text>
    <circle cx="250" cy="320" r="18" class="park node"/><text x="245" y="327" text-anchor="middle" class="day">12</text>
    <text x="92" y="314" class="label tiny">頤和園</text>
    <circle cx="335" cy="366" r="18" class="park node"/><text x="330" y="373" text-anchor="middle" class="day">13</text>
    <text x="176" y="368" class="label tiny">圓明園／海淀</text>
    <circle cx="610" cy="390" r="18" class="spa node"/><text x="605" y="397" text-anchor="middle" class="day">14</text>
    <text x="632" y="384" class="label tiny">胡同＋湯泉</text>
    <circle cx="970" cy="520" r="20" class="universal node"/><text x="965" y="527" text-anchor="middle" class="day">15</text>
    <text x="995" y="527" class="label tiny">北京環球影城</text>
  </g>

  <rect x="805" y="585" width="250" height="70" rx="12" fill="#e7f1ec" stroke="#b9d0c4"/>
  <text x="830" y="616" class="label tiny" font-weight="800">7/14-7/16 後段住宿</text>
  <text x="830" y="644" class="label tiny muted">通州環球度假區周邊</text>

  <rect x="92" y="610" width="570" height="92" rx="12" fill="#fff7ea" stroke="#dfd0bd"/>
  <text x="122" y="642" class="label tiny" font-weight="800">住宿判斷</text>
  <text x="122" y="672" class="label tiny muted">前半段景點集中在中心與西北，市中心基地合理；環球在東南遠端，前一晚移動到通州合理。</text>
</svg>
